<!DOCTYPE html>
<html>

<head>
  <title>Le petit jardinier</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <svg class="bg-leaf bg-leaf--top" width="340" height="340" viewBox="0 0 24 24"><path d="M12 2 C4 8 4 18 12 22 C20 18 20 8 12 2 Z" fill="#a8c686"></path><path d="M12 4 L12 21" stroke="#0f1f15" stroke-width=".4"></path></svg>
  <svg class="bg-leaf bg-leaf--bottom" width="280" height="280" viewBox="0 0 24 24"><path d="M12 2 C4 8 4 18 12 22 C20 18 20 8 12 2 Z" fill="#a8c686"></path></svg>

  <div class="card-wrap">
    <div class="card">
      <svg class="card-leaf" width="128" height="128" viewBox="0 0 24 24"><path d="M12 2 C4 8 4 18 12 22 C20 18 20 8 12 2 Z" fill="#a8c686"></path><path d="M12 4 L12 21" stroke="#13231a" stroke-width=".6"></path></svg>

      <div class="card-inner">
        <div class="header">
          <div class="header-icon">
            <svg width="19" height="19" viewBox="0 0 24 24"><path d="M12 2 C4 8 4 18 12 22 C20 18 20 8 12 2 Z" fill="#cde6a8"></path><path d="M12 5 L12 20" stroke="#234a2b" stroke-width="1"></path></svg>
          </div>
          <div class="header-text">
            <div class="header-title">Le petit jardinier</div>
            <div class="header-sub">environment metrics</div>
          </div>
          <div class="live-badge" id="live-badge">
            <span class="live-dot" id="live-dot"></span>
            <span id="live-label">live</span>
          </div>
        </div>

        <div class="filters">
          <div id="range-pills" class="pills">
            <span class="pill" data-days="1">1d</span>
            <span class="pill" data-days="3">3d</span>
            <span class="pill" data-days="7">7d</span>
            <span class="pill" data-days="14">14d</span>
            <span class="pill" data-days="30">30d</span>
          </div>
          <div class="device-picker" id="device-picker">
            <div class="device-toggle" id="device-toggle">
              <span class="device-dot"></span>
              <span id="device-label">cherry-3-pot</span>
              <span class="device-caret">&#9662;</span>
            </div>
            <div class="device-menu" id="device-menu" hidden>
              <div class="device-option" data-device="cherry-3-pot"><span class="device-option-dot"></span>cherry-3-pot</div>
              <div class="device-option" data-device="cherry-2-pot"><span class="device-option-dot"></span>cherry-2-pot</div>
            </div>
          </div>
        </div>

        <div class="gauges">
          <div class="gauge" id="gauge-moisture">
            <div class="gauge-ring" id="gauge-moisture-ring">
              <div class="gauge-inner">
                <span class="gauge-value" id="moisture">&ndash;<span class="gauge-unit">%</span></span>
                <span class="gauge-label">moisture</span>
              </div>
            </div>
          </div>
          <div class="gauge" id="gauge-battery">
            <div class="gauge-ring" id="gauge-battery-ring">
              <div class="gauge-inner">
                <span class="gauge-value" id="battery-percent">&ndash;<span class="gauge-unit">%</span></span>
                <span class="gauge-label">battery</span>
              </div>
            </div>
          </div>
          <div class="gauge" id="gauge-temp">
            <div class="gauge-ring" id="gauge-temp-ring">
              <div class="gauge-inner">
                <span class="gauge-value" id="temperature">&ndash;<span class="gauge-unit">&deg;</span></span>
                <span class="gauge-label">temp</span>
              </div>
            </div>
          </div>
        </div>

        <div class="info-row">
          <div class="info-box">
            <div class="info-label">last update</div>
            <div class="info-value" id="last-updated-time">&ndash;</div>
          </div>
          <div class="info-box">
            <div class="info-label">last watered</div>
            <div class="info-value" id="last-watered-time">&ndash;</div>
          </div>
          <div class="info-box info-box--tank">
            <div class="info-label">tank</div>
            <div class="info-tank">
              <span class="tank-dot" id="tank-dot"></span>
              <span class="info-value" id="tank-label">&ndash;</span>
            </div>
          </div>
        </div>

        <div class="chart-header">
          <span class="chart-title">moisture &middot; temp &middot; battery</span>
          <span class="chart-max-temp" id="max-temperature">max &ndash;&deg;C</span>
        </div>
        <div id="chart"></div>
        <div class="legend">
          <span class="legend-item"><span class="legend-swatch legend-swatch--moisture"></span>moisture %</span>
          <span class="legend-item"><span class="legend-swatch legend-swatch--battery"></span>battery %</span>
          <span class="legend-item"><span class="legend-swatch legend-swatch--temp"></span>temp &deg;C</span>
        </div>

        <div class="chart-title chart-title--strip">watering &middot; water tank</div>
        <div id="strip"></div>
        <div class="legend">
          <span class="legend-item"><svg width="9" height="11" viewBox="0 0 32 36"><path d="M16 1 C16 1 29 15 29 22 A13 13 0 1 1 3 22 C3 15 16 1 16 1 Z" fill="#7fd4ff"></path></svg>watered</span>
          <span class="legend-item"><span class="legend-swatch legend-swatch--avail"></span>water available</span>
          <span class="legend-item"><span class="legend-swatch legend-swatch--empty"></span>tank empty</span>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <script src="index.js"></script>
</body>

</html>
